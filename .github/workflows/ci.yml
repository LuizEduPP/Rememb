name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/ci.yml"
      - "Dockerfile"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Dockerfile"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && '["3.12"]' || '["3.10", "3.11", "3.12"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package and test dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: |
          python -m py_compile src/rememb/*.py
          python -m py_compile src/rememb/store/*.py
          python -m py_compile src/rememb/storage/*.py

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: rememb-ci-smoke:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test MCP CLI in container
        run: |
          docker run --rm rememb-ci-smoke:latest rememb mcp --help | grep -q -- '--transport'
          docker image rm -f rememb-ci-smoke:latest
