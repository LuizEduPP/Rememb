[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memdir"
version = "0.1.0"
description = "Persistent memory standard for AI agents — local, portable, zero config"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["ai", "agents", "memory", "llm", "mcp", "windsurf", "cursor", "claude"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "sentence-transformers>=3.0.0",
    "numpy>=1.24.0",
]

[project.scripts]
memdir = "memdir.cli:app"

[project.urls]
Homepage = "https://github.com/yourusername/memdir"
Repository = "https://github.com/yourusername/memdir"
Issues = "https://github.com/yourusername/memdir/issues"

[tool.setuptools.packages.find]
where = ["src"]
