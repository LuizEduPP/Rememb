<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rememb</title>
<link rel="stylesheet" href="/static/style.css?v={{STYLE_VERSION}}">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a class="brand" href="/">
      <img src="/static/logo.png" alt="">
      <div>
        <strong>rememb</strong>
        <small id="logo-version"></small>
      </div>
    </a>
    <label class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" type="search" placeholder="Search memory…" autocomplete="off">
    </label>
    <nav class="nav">
      <button class="nav-item" data-view="dashboard" data-nav-view aria-current="page">Overview</button>
      <button class="nav-item" data-view="memories" data-nav-view>Memory</button>
      <button class="nav-item" data-view="stats" data-nav-view>Stats</button>
      <button class="nav-item" data-view="settings" data-nav-view>Settings</button>
      <button class="nav-item" data-view="skills" data-nav-view>Skills</button>
    </nav>
    <p class="sidebar-foot">Supervision · agent writes via MCP</p>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1 id="page-title">Overview</h1>
        <p id="page-subtitle">Memory store at a glance</p>
      </div>
      <span id="topbar-badge" class="badge">Read-only</span>
    </header>

    <div class="page">
      <section id="view-dashboard" class="view">
        <dl class="stats">
          <div><dt>Entries</dt><dd id="dashboard-entries-count">—</dd></div>
          <div><dt>Sections</dt><dd id="dashboard-sections-count">—</dd></div>
          <div><dt>Deleted</dt><dd id="dashboard-deleted-count">—</dd></div>
          <div><dt>Size (KB)</dt><dd id="dashboard-size-count">—</dd></div>
        </dl>
        <section class="surface">
          <header class="surface-head">
            <h2>Recent memory</h2>
            <button class="btn btn-ghost btn-sm" data-shortcut-view="memories">View all</button>
          </header>
          <div id="dashboard-recent-list" class="rows"></div>
        </section>
      </section>

      <section id="view-memories" class="view" hidden>
        <div id="search-results-bar" class="notice" hidden>
          <span id="search-results-label"></span>
          <button id="clear-search" class="btn btn-ghost btn-sm">Clear</button>
        </div>
        <div class="filters">
          <nav id="sections-list" class="chips"></nav>
          <div class="filters-actions">
            <label class="check"><input id="toggle-include-deleted" type="checkbox"><span>Show deleted</span></label>
            <select id="sort-select" class="input">
              <option value="recent-desc">Newest</option>
              <option value="recent-asc">Oldest</option>
              <option value="storage-asc">Storage ↑</option>
              <option value="storage-desc">Storage ↓</option>
            </select>
          </div>
        </div>
        <div id="cards-grid" class="grid"></div>
        <div id="load-more-wrap" class="pager" hidden><button id="btn-load-more" class="btn">Load more</button></div>
      </section>

      <section id="view-stats" class="view" hidden>
        <p class="lede" id="dash-updated"></p>
        <dl class="stats">
          <div><dt>Entries</dt><dd id="dash-total">—</dd></div>
          <div><dt>Sections</dt><dd id="dash-active-sec">—</dd></div>
          <div><dt>Size (KB)</dt><dd id="dash-size">—</dd></div>
          <div><dt>Backend</dt><dd id="dash-storage">—</dd></div>
          <div><dt>Oldest</dt><dd id="dash-oldest">—</dd></div>
          <div><dt>Newest</dt><dd id="dash-newest">—</dd></div>
        </dl>
        <div class="columns">
          <section class="surface">
            <header class="surface-head"><h2>By section</h2></header>
            <div id="dash-section-bars" class="bars"></div>
          </section>
          <section class="surface">
            <header class="surface-head"><h2>Recent</h2></header>
            <div id="dash-recent-list" class="rows"></div>
          </section>
        </div>
      </section>

      <section id="view-skills" class="view" hidden>
        <p class="lede" id="skills-updated"></p>
        <aside id="skills-package-banner" class="notice notice-info" hidden></aside>
        <section class="surface surface--flush">
          <div id="skills-root" class="grid grid-skills"><div class="empty empty-loading">Loading…</div></div>
        </section>
      </section>

      <section id="view-settings" class="view" hidden>
        <div id="settings-form-root"><div class="empty empty-loading">Loading…</div></div>
      </section>
    </div>
  </main>
</div>

<div id="toast-container" class="toasts"></div>
<div id="modal-root" class="modal-host"></div>

<script src="/static/app.js?v={{APP_VERSION}}"></script>
</body>
</html>
